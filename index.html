<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>タックスナップ アンケート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@rive-app/canvas@2.7.0"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#27BA74;--brand-light:#e8f8f0;--brand-dark:#1e9a5e;--bg:#f7f9fc;--card:#fff;--text:#222;--text-sub:#666;--text-light:#999;--error:#e74c3c;--error-bg:#fef0f0;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.06)}
html{font-size:16px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
.container{width:100%;max-width:480px;margin:0 auto;padding:0 16px;position:relative;min-height:100dvh;overflow:hidden}
/* logo */
.logo-bar{text-align:center;padding:12px 0 0;position:sticky;top:0;z-index:101;background:var(--bg)}
.logo-bar img{height:24px}
/* progress */
.progress-wrap{position:sticky;top:36px;z-index:100;background:var(--bg);padding:8px 0 4px}
.progress-track{position:relative;height:6px;border-radius:3px;background:#e0e0e0;overflow:visible}
.progress-fill{height:100%;background:var(--brand);border-radius:3px;transition:width .4s ease}
/* slides */
.slide-area{position:relative;width:100%;flex:1}
.slide{position:absolute;top:0;left:0;width:100%;opacity:0;transform:translateX(40px);transition:all .4s ease;pointer-events:none;padding-bottom:80px}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto;position:relative}
.slide.exit-left{opacity:0;transform:translateX(-40px)}
/* intro */
.intro-card{background:var(--card);border-radius:var(--radius);padding:0;box-shadow:var(--shadow);margin-top:24px;overflow:hidden}
.intro-hero{background:linear-gradient(180deg,#e8f8f0 0%,#f0faf5 50%,#fff 100%);padding:32px 20px 16px;text-align:center;position:relative;overflow:hidden}
.intro-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(39,186,116,.06);border-radius:50%}
.intro-hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;background:rgba(39,186,116,.04);border-radius:50%}
.intro-hero .deco{position:absolute;opacity:.6;animation:decoFloat 3s ease-in-out infinite}
.intro-hero .deco-1{top:12px;left:16px;font-size:20px;transform:rotate(-15deg);animation-delay:0s}
.intro-hero .deco-2{top:10px;right:20px;font-size:18px;transform:rotate(10deg);animation-delay:.5s}
.intro-hero .deco-3{bottom:14px;right:14px;font-size:16px;transform:rotate(20deg);animation-delay:1s}
.intro-hero .deco-4{top:50%;left:8px;font-size:14px;transform:rotate(-10deg);animation-delay:1.5s}
.intro-hero .deco-5{bottom:30px;left:30%;font-size:12px;animation-delay:2s}
.intro-hero .deco-6{top:20px;right:40%;font-size:14px;animation-delay:.8s}
.intro-hero .deco-7{bottom:8px;left:10%;font-size:16px;animation-delay:.3s}
.intro-hero .deco-8{top:30%;right:8px;font-size:13px;animation-delay:1.2s}
.intro-hero .deco-9{top:15px;left:35%;font-size:11px;animation-delay:1.8s}
.intro-hero .deco-10{bottom:20px;right:30%;font-size:15px;animation-delay:.6s}
.intro-hero .deco-11{top:40%;left:25%;font-size:10px;animation-delay:2.2s}
.intro-hero .deco-12{bottom:40px;right:8%;font-size:13px;animation-delay:1s}
.intro-hero .deco-13{top:8px;left:50%;font-size:12px;animation-delay:2.5s}
.intro-hero .deco-14{top:55%;right:15%;font-size:11px;animation-delay:.4s}
.intro-hero .deco-15{bottom:5px;left:45%;font-size:14px;animation-delay:1.7s}
.intro-hero .deco-16{top:25%;left:5%;font-size:12px;animation-delay:2.8s}
@keyframes decoFloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-4px) rotate(var(--r,0deg))}}
.intro-hero canvas{width:120px;height:120px;margin:0 auto 10px;display:block;position:relative;z-index:1}
.intro-speech{display:inline-block;background:#fff;border-radius:20px 20px 20px 4px;box-shadow:0 2px 10px rgba(39,186,116,.1);padding:10px 20px;margin-bottom:14px;position:relative;opacity:0;transform:translateY(8px) scale(.95);transition:all .5s cubic-bezier(.34,1.56,.64,1);border:1.5px solid rgba(39,186,116,.15)}
.intro-speech.show{opacity:1;transform:translateY(0) scale(1)}
.intro-speech p{font-size:13px;font-weight:700;color:var(--brand)}
.intro-speech::after{content:'';position:absolute;bottom:-6px;left:24px;width:12px;height:12px;background:#fff;transform:rotate(45deg);border-bottom:1.5px solid rgba(39,186,116,.15);border-right:1.5px solid rgba(39,186,116,.15)}
/* incentive banner */
.intro-incentive{background:linear-gradient(135deg,#fef9e7 0%,#fdf2c5 50%,#fce8a0 100%);border-radius:16px;padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;border:2px solid #f0c040;box-shadow:0 4px 16px rgba(240,192,64,.2);position:relative;overflow:hidden}
.intro-incentive .incentive-icon{font-size:38px;flex-shrink:0;animation:decoFloat 2s ease-in-out infinite}
.intro-incentive .incentive-text{font-size:13px;font-weight:700;color:#7a5c0a;line-height:1.6}
.intro-incentive .incentive-text .incentive-highlight{color:#d63031;font-size:19px;font-weight:800}
.intro-body{padding:0 20px 24px}
.intro-badge{display:inline-block;background:var(--brand);color:#fff;font-size:13px;font-weight:700;padding:5px 16px;border-radius:50px;margin-bottom:12px}
.intro-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.5}
.intro-sub{font-size:13px;color:var(--text-sub);margin-bottom:20px;line-height:1.7}
.intro-email-wrap{position:relative;margin-bottom:16px}
.intro-email-wrap .email-check{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:20px;opacity:0;transition:opacity .3s}
.intro-email-wrap .email-check.show{opacity:1;animation:optionPop .3s ease}
/* question card */
.q-card{background:var(--card);border-radius:var(--radius);padding:24px 20px;box-shadow:var(--shadow);margin-top:16px}
.q-label{font-size:11px;color:var(--text-light);margin-bottom:4px}
.q-number{font-size:12px;color:var(--brand);font-weight:700;margin-bottom:4px}
.q-hint{font-size:11px;color:var(--text-light);margin-bottom:10px}
.q-text{font-size:15px;font-weight:700;line-height:1.7;margin-bottom:20px;white-space:pre-line}
.optional-badge{display:inline-block;background:#eee;color:#999;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:6px;font-weight:400}
/* info callout */
.info-callout{background:var(--brand-light);border-left:3px solid var(--brand);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--text-sub);line-height:1.6}
.info-callout strong{color:var(--brand);font-weight:700}
/* SA options */
.sa-option{display:flex;align-items:center;padding:13px 16px;border:2px solid #e8e8e8;border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.5;user-select:none}
.sa-option:hover{border-color:var(--brand-light);background:var(--brand-light)}
.sa-option.selected{border-color:var(--brand);background:var(--brand-light);font-weight:500;animation:optionPop .3s ease}
.sa-option .radio{width:20px;height:20px;border:2px solid #ccc;border-radius:50%;margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sa-option.selected .radio{border-color:var(--brand);background:var(--brand)}
.sa-option.selected .radio::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}
/* SA rich (badge+desc) */
.sa-option .opt-badge{display:inline-block;background:var(--brand);color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:50px;margin-bottom:4px}
.sa-option .opt-desc{font-size:14px;color:var(--text)}
.sa-option .opt-sub{font-size:11px;color:var(--text-light);margin-top:2px}
.sa-option .opt-icon{font-size:22px;margin-right:10px;flex-shrink:0}
/* MA options */
.ma-option{display:flex;align-items:flex-start;padding:13px 16px;border:2px dashed #d0d0d0;border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.5;user-select:none}
.ma-option:hover{border-color:var(--brand-light);background:var(--brand-light)}
.ma-option.selected{border:2px solid var(--brand);background:var(--brand-light);font-weight:500;animation:optionPop .3s ease}
.ma-option .checkbox{width:20px;height:20px;border:2px solid #ccc;border-radius:5px;margin-left:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.ma-option.selected .checkbox{border-color:var(--brand);background:var(--brand)}
.ma-option.selected .checkbox::after{content:'\2713';color:#fff;font-size:13px;font-weight:700}
@keyframes optionPop{0%{transform:scale(1)}25%{transform:scale(1.035)}50%{transform:scale(.99)}100%{transform:scale(1)}}
/* micro sparkle particles */
.micro-particle{position:fixed;pointer-events:none;z-index:9999;font-size:14px;opacity:0;animation:microFloat .8s ease forwards}
@keyframes microFloat{0%{opacity:1;transform:translate(0,0) scale(.8)}50%{opacity:.8}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.3)}}
/* inline text */
.inline-text{width:100%;margin-top:8px;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;resize:vertical;min-height:40px;transition:border-color .2s}
.inline-text:focus{outline:none;border-color:var(--brand)}
/* free text */
.fa-textarea{width:100%;padding:14px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;resize:vertical;min-height:100px;transition:border-color .2s;line-height:1.6}
.fa-textarea:focus{outline:none;border-color:var(--brand)}
/* NPS stars */
.nps-wrap{display:flex;flex-direction:column;align-items:center}
.nps-labels{display:flex;justify-content:space-between;width:100%;margin-bottom:6px}
.nps-label-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.nps-label-icon{font-size:28px;line-height:1}
.nps-label-text{font-size:10px;color:var(--text-light)}
.nps-stars{display:flex;gap:3px;justify-content:center;flex-wrap:nowrap;width:100%}
.nps-star{width:32px;height:32px;border-radius:50%;border:2px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text-sub);background:#fff;user-select:none;position:relative;flex-shrink:0;overflow:visible}
.nps-star:hover{border-color:var(--brand);transform:scale(1.08)}
.nps-star.selected{border-color:transparent;background:var(--brand);color:#fff;animation:npsDrop .45s cubic-bezier(.3,1.5,.6,1);box-shadow:0 2px 10px rgba(39,186,116,.35)}
@keyframes npsDrop{0%{transform:scale(.3) translateY(-20px);opacity:0}40%{transform:scale(1.15) translateY(2px);opacity:1}60%{transform:scale(.92) translateY(-1px)}80%{transform:scale(1.04)}100%{transform:scale(1) translateY(0)}}
.nps-ripple{position:absolute;width:100%;height:100%;top:0;left:0;border-radius:50%;pointer-events:none;border:2px solid var(--brand);animation:npsRipple .6s ease forwards;opacity:0}
@keyframes npsRipple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}
/* NPS inline FA */
.nps-fa-wrap{margin-top:20px;padding-top:16px;border-top:1px solid #eee}
.nps-fa-wrap.hidden-step{display:none}
/* matrix */
.matrix-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;border:2px solid #eee;transition:border-color .3s,box-shadow .3s}
.matrix-card.answered{border-color:var(--brand);box-shadow:0 0 0 1px rgba(39,186,116,.15)}
.matrix-card .concept{margin-bottom:14px}
.matrix-card .concept-title{display:inline-block;background:var(--brand);color:#fff;font-weight:700;font-size:13px;padding:4px 14px;border-radius:50px;margin-bottom:8px}
.matrix-card .concept-desc{font-size:14px;color:var(--text);line-height:1.7;font-weight:500}
.likert-row{display:flex;gap:0;justify-content:space-between}
.likert-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 2px 8px;cursor:pointer;transition:all .2s;user-select:none;border-radius:10px;background:transparent}
.likert-btn:hover{background:var(--brand-light)}
.likert-btn .likert-icon{font-size:22px;line-height:1;transition:transform .2s}
.likert-btn .likert-label{font-size:9px;color:var(--text-light);line-height:1.2;text-align:center}
.likert-btn.selected{background:var(--brand-light);animation:optionPop .3s ease}
.likert-btn.selected .likert-icon{transform:scale(1.2)}
.likert-btn.selected .likert-label{color:var(--brand);font-weight:700}
/* Q35 inline steps */
.q35-step{margin-top:20px;padding-top:20px;border-top:1px solid #eee}
.q35-step.hidden-step{display:none}
.hidden-step{display:none}
.q35-step .q-text{font-size:14px;font-weight:600;margin-bottom:14px}
/* funnel step (Q11) */
.funnel-flow{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:20px;padding:0 4px}
.funnel-step{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.funnel-step .step-circle{width:36px;height:36px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .3s}
.funnel-step .step-name{font-size:10px;color:var(--text-light);text-align:center;line-height:1.2}
.funnel-arrow{color:#ccc;font-size:14px;padding-bottom:14px;position:relative}
.funnel-arrow .arrow-x{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:10px;color:#e74c3c;font-weight:700;opacity:0;transition:opacity .3s}
.funnel-arrow .arrow-x.show{opacity:1}
.funnel-step.active .step-circle{background:var(--brand);box-shadow:0 0 8px rgba(39,186,116,.3)}
.funnel-option{display:flex;align-items:center;padding:14px 16px;border:2px solid #e8e8e8;border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .2s;user-select:none}
.funnel-option:hover{border-color:var(--brand-light);background:var(--brand-light)}
.funnel-option.selected{border-color:var(--brand);background:var(--brand-light);font-weight:500;animation:optionPop .3s ease}
.funnel-option .radio{width:20px;height:20px;border:2px solid #ccc;border-radius:50%;margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.funnel-option.selected .radio{border-color:var(--brand);background:var(--brand)}
.funnel-option.selected .radio::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}
.funnel-option .funnel-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--brand);background:var(--brand-light);padding:2px 8px;border-radius:4px;margin-right:8px;flex-shrink:0}
.funnel-option .funnel-label{font-size:13px;color:var(--text);line-height:1.5;white-space:pre-line}
/* Q36/Q37 CTA */
.cta-card{background:var(--card);border-radius:var(--radius);padding:32px 20px;box-shadow:var(--shadow);margin-top:16px;text-align:center}
.cta-card .q-number{text-align:left}
.cta-card .cta-text{font-size:15px;font-weight:500;line-height:1.7;margin-bottom:24px;color:var(--text)}
.cta-card .cta-sub{font-size:12px;color:var(--text-light);margin-bottom:20px;line-height:1.6}
.cta-ok{display:inline-block;padding:16px 48px;background:#fff;color:var(--text);border:2px solid #e0e0e0;border-radius:50px;font-size:18px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;box-shadow:none}
.cta-ok:hover{transform:translateY(-2px);border-color:var(--brand);color:var(--brand)}
.cta-no{background:#fff;color:var(--text-sub)}
.cta-no:hover{border-color:#aaa;color:var(--text-sub);transform:translateY(-2px)}
.cta-ok.cta-selected{background:var(--brand);color:#fff;border-color:var(--brand);transform:scale(1.05);box-shadow:0 4px 16px rgba(39,186,116,.3)}
.cta-no.cta-selected{background:var(--text-sub);color:#fff;border-color:var(--text-sub);transform:scale(1.05)}
.cta-ok:active{transform:scale(.96)}
.cta-ok.done{background:#f0f0f0;color:var(--text-light);box-shadow:none;pointer-events:none}
.cta-skip{display:block;margin:14px auto 0;background:none;border:none;color:var(--text-light);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.cta-skip:hover{color:var(--text-sub)}
.confetti{position:fixed;pointer-events:none;z-index:9999;font-size:20px;animation:confettiFall 1s ease forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(120px) rotate(360deg) scale(.6)}}
/* buttons */
.btn-next{display:block;width:100%;padding:15px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;margin-top:16px}
.btn-next:hover{background:var(--brand-dark)}
.btn-next:disabled{background:#ccc;cursor:not-allowed}
.btn-back{display:block;width:100%;padding:12px;background:transparent;color:var(--text-light);border:none;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:4px}
.btn-back:hover{color:var(--text-sub)}
/* email input */
.email-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;transition:border-color .2s}
.email-input:focus{outline:none;border-color:var(--brand)}
.email-input.error{border-color:var(--error)}
/* error */
.error-msg{color:var(--error);font-size:12px;margin-top:6px;display:none;padding:6px 10px;background:var(--error-bg);border-radius:8px}
.error-msg.show{display:block}
/* completion */
.complete-card{background:var(--card);border-radius:var(--radius);padding:32px 20px;box-shadow:var(--shadow);margin-top:40px;text-align:center}
.complete-card .rive-complete{width:150px;height:150px;margin:0 auto 20px}
.complete-card .done-text{font-size:20px;font-weight:700;color:var(--brand);margin-bottom:12px}
.complete-card .done-sub{font-size:14px;color:var(--text)}
/* submitting overlay */
.submitting{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.submitting .spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.submitting p{font-size:14px;color:var(--text-sub)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="logo-bar"><img src="taxnap_logo.png" alt="タックスナップ"></div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="slide-area" id="slideArea"></div>
</div>
<div class="submitting hidden" id="submitting"><div class="spinner"></div><p>送信しています…</p></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxw7biTKBHNRzrf_pf94WEoNTuTGyldWaOFLCjrj4Y_cUmS69LmrDQwbWHV74_2gdx7/exec';
const POST_TOKEN = 'e7c794ae-e219-45d9-8255-7bcd9a6e95e9';

const answers = {};
let currentSlide = 'intro';
let slideHistory = [];
let shuffledOptions = {};

/* ── Utility ──────────────────────────────────────── */
const SPARKLE_ICONS=['✦','✧','❋','✨','·'];
function emitSparkles(el,count=5){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width*0.12, cy=rect.top+rect.height/2;
  for(let i=0;i<count;i++){
    const p=document.createElement('span');
    p.className='micro-particle';
    p.textContent=SPARKLE_ICONS[Math.floor(Math.random()*SPARKLE_ICONS.length)];
    const dx=(Math.random()-.5)*70, dy=-(25+Math.random()*35);
    p.style.cssText=`left:${cx+Math.random()*24-12}px;top:${cy+Math.random()*12-6}px;--dx:${dx}px;--dy:${dy}px;animation-delay:${i*0.05}s;color:var(--brand)`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function randomizeKeepLast(opts,n){return[...shuffle(opts.slice(0,opts.length-n)),...opts.slice(opts.length-n)]}
function randomizeKeepLast2(opts){return randomizeKeepLast(opts,2)}

/* ── Branching ────────────────────────────────────── */
function getNextSlide(cur){
  if(cur==='intro') return 'q2';
  if(cur==='q2') return ['1','2','3'].includes(answers.q2)?'q3':'q4';
  if(cur==='q3') return 'q4';
  if(cur==='q4') return 'q5';
  if(cur==='q5') return 'q6';
  if(cur==='q6') return 'q6b';
  if(cur==='q6b') return 'q8';
  if(cur==='q8') return 'q7';
  if(cur==='q7') return 'q9'; /* Q8 is inline with Q7 */
  if(cur==='q9'){ /* Q10 is inline with Q9 */
    if(['1','2'].includes(answers.q2)||answers.q4==='1') return 'q11';
    return 'q28';
  }
  if(cur==='q11'){
    if(answers.q11==='1') return 'q12';
    if(answers.q11==='2') return 'q20';
    return 'q28';
  }
  if(cur==='q12'){
    return{1:'q13',2:'q14',3:'q15',4:'q16',5:'q17',6:'q18',7:'q19',8:'q28'}[answers.q12]||'q28';
  }
  if(['q13','q14','q15','q16','q17','q18','q19'].includes(cur)) return 'q28';
  if(cur==='q20'){
    return{1:'q21',2:'q22',3:'q23',4:'q24',5:'q25',6:'q27',7:'q28'}[answers.q20]||'q28';
  }
  if(['q21','q22','q23','q24'].includes(cur)) return 'q28';
  if(cur==='q25'){
    const vals=(answers.q25||'').split(',');
    if(vals.includes('e')) return 'q26';
    return 'q28';
  }
  if(cur==='q26') return 'q28';
  if(cur==='q27') return 'q28';
  if(cur==='q28'){
    // Q28でタックスナップのみ or 初めてのみ → Q29(切り替え前の手段)をスキップ
    const v28=(answers.q28||'').split(',').filter(Boolean);
    const onlyTaxnap=v28.length===1&&(v28[0]==='5'||v28[0]==='12');
    if(onlyTaxnap)return 'q31';
    return 'q29';
  }
  if(cur==='q29') return answers.q29==='0'?'q30':'q31';
  if(cur==='q30') return 'q31';
  if(cur==='q31') return 'q32';
  if(cur==='q32') return 'q33';
  if(cur==='q33') return 'q34';
  if(cur==='q34') return ['1','2'].includes(answers.q2)?'q35':'q37';
  if(cur==='q35') return 'q37';
  if(cur==='q36') return 'q37'; /* Q36は完了画面に移動 */
  if(cur==='q37') return 'complete';
  return 'complete';
}

function countTotalSlides(){
  let c=1,s='intro';const v=new Set();
  while(s!=='complete'&&c<50){v.add(s);s=getNextSlide(s);if(s==='complete')break;if(v.has(s))break;c++}
  return c;
}
function getSlideIndex(){return slideHistory.length}
/* visible Q number = position among answered questions (not internal qid) */
function getVisibleQNum(qid){
  let n=0;
  for(const sid of slideHistory){if(sid!=='intro')n++}
  if(qid!=='intro')n++;
  return n;
}
function updateProgress(){
  const t=countTotalSlides(),c=getSlideIndex(),p=Math.min(Math.round(c/t*100),100);
  document.getElementById('progressFill').style.width=p+'%';
}
function qHeader(qid,type,optional){
  const n=getVisibleQNum(qid);
  return `<div class="q-number">Q${n}${optional?' <span class="optional-badge">任意</span>':''}</div>`;
}
function qHint(type){
  let hint='';
  if(type==='sa')hint='ひとつだけ選んでください';
  else if(type==='ma')hint='あてはまるものをすべて選んでください';
  else if(type==='nps')hint='1〜10から選んでください';
  else if(type==='matrix')hint='それぞれひとつずつ選んでください';
  return hint?`<div class="q-hint">${hint}</div>`:'';
}

/* ── Ordered options ──────────────────────────────── */
function getOrderedOptions(qid){
  const q=Q[qid];if(!q||!q.options)return[];
  if(shuffledOptions[qid])return shuffledOptions[qid];
  let opts=[...q.options];
  if(q.order==='randomize_last1') opts=randomizeKeepLast(opts,1);
  else if(q.order==='randomize_last2') opts=randomizeKeepLast(opts,2);
  shuffledOptions[qid]=opts;return opts;
}

function handleFunnelClick(el){
  const qid=el.dataset.qid,container=el.closest('.q-card');
  container.querySelectorAll('.funnel-option').forEach(o=>{o.classList.remove('selected');const f=o.querySelector('.inline-text');if(f)f.classList.add('hidden')});
  el.classList.add('selected');
  emitSparkles(el);
  // highlight funnel steps + show x on blocked arrow
  const step=el.dataset.fstep;
  container.querySelectorAll('.funnel-step').forEach(s=>{
    const sv=s.dataset.step;
    if(step&&parseInt(sv)<=parseInt(step))s.classList.add('active');
    else s.classList.remove('active');
  });
  container.querySelectorAll('.funnel-arrow').forEach(a=>{
    const x=a.querySelector('.arrow-x');if(!x)return;
    const after=a.dataset.after;
    if(step&&after===step)x.classList.add('show');
    else x.classList.remove('show');
  });
  // freetext
  const ft=el.querySelector('.inline-text');if(ft){ft.classList.remove('hidden');ft.focus()}
}

  let h=`<div class="q-card">${qHeader('q29','sa',false)}
    <div class="q-text">${escHtml(Q.q29.text)}</div>${qHint('sa')}`;

  });
  h+=`<button class="btn-next" onclick="handleSASubmit('q29')">次へ</button>${backBtn()}</div>`;return h;
}

/* ── Slide transition ─────────────────────────────── */
function showSlide(id){
  const area=document.getElementById('slideArea'),old=area.querySelector('.slide.active');
  let html='';
  if(id==='intro') html=renderIntro();
  else if(id==='complete') html=renderComplete();
  else if(id==='q29') html=renderQ29();
  else if(id==='q35'){q35phase=0;html=renderQ35()}
  else if(id==='q36'||id==='q37') html=renderCTA(id);
  else{
    const q=Q[id];if(!q)return;
    if(q.type==='sa_funnel') html=renderFunnel(id);
    else if(q.type==='sa'||q.type==='sa_dynamic') html=renderSA(id);
    else if(q.type==='ma') html=renderMA(id);
    else if(q.type==='fa') html=renderFA(id);
    else if(q.type==='nps') html=renderNPS(id);
    else if(q.type==='matrix') html=renderMatrix(id);
    else if(q.type==='multi_step') html=renderQ35();
  }
  const ns=document.createElement('div');ns.className='slide';ns.innerHTML=html;area.appendChild(ns);
  ns.offsetHeight;
  if(old){old.classList.remove('active');old.classList.add('exit-left');setTimeout(()=>old.remove(),400)}
  setTimeout(()=>ns.classList.add('active'),50);
  currentSlide=id;updateProgress();
  if(id==='intro'){initRive('snappyIntro');setTimeout(()=>{const sp=document.getElementById('snappySpeech');if(sp)sp.classList.add('show')},500)}
  if(id==='complete')initRive('riveComplete');
  window.scrollTo({top:0,behavior:'smooth'});
  // restore previous answers on this slide
  setTimeout(()=>restoreAnswers(id),60);
}

function restoreAnswers(id){
  // CTA restore
  if(id==='q36'||id==='q37'){
    const val=answers[id];if(!val)return;
    const btn=document.querySelector(`.cta-ok[data-qid="${id}"][data-val="${val}"]`);
    if(btn)btn.classList.add('cta-selected');
    return;
  }
  if(id==='intro'){
    const inp=document.getElementById('emailInput');
    if(inp&&answers.email)inp.value=answers.email;
    return;
  }
  const q=Q[id];if(!q)return;
  const val=answers[id];if(!val&&val!=='')return;

  if(q.type==='sa'||q.type==='sa_dynamic'||q.type==='sa_funnel'||id==='q29'){
    if(!val)return;
    const opt=document.querySelector(`[data-qid="${id}"][data-val="${val}"]`);
    if(opt){opt.classList.add('selected');
      const ft=opt.querySelector('.inline-text'),ftVal=answers[id+'_text'];
      if(ft&&ftVal){ft.classList.remove('hidden');ft.value=ftVal}
    }
    // Q2: restore sub-question
    if(id==='q2'&&(val==='2'||val==='3')){
      const subOpt=document.querySelector('[data-qid="q2"][data-val="sub"]');
      if(subOpt)subOpt.classList.add('selected');
      const wrap=document.getElementById('q2SubWrap');if(wrap)wrap.classList.remove('hidden-step');
      const subSel=document.querySelector(`[data-qid="q2sub"][data-val="${val}"]`);
      if(subSel)subSel.classList.add('selected');
    }
    // Q9: restore inline Q10
    if(id==='q9'){const fa=document.getElementById('q9FAWrap');if(fa)fa.classList.remove('hidden-step');
      const ta=document.getElementById('fa_q10');if(ta&&answers.q10)ta.value=answers.q10}
  }
  else if(q.type==='ma'){
    const vals=(val||'').split(',');
    vals.forEach(v=>{
      const opt=document.querySelector(`[data-qid="${id}"][data-val="${v}"]`);
      if(opt){opt.classList.add('selected');
        const ft=opt.querySelector('.inline-text');
        if(ft){ft.classList.remove('hidden');
          try{const texts=JSON.parse(answers[id+'_text']||'{}');if(texts[v])ft.value=texts[v]}catch(e){}}
      }
    });
  }
  else if(q.type==='nps'){
    if(!val)return;
    const star=document.querySelector(`.nps-star[data-val="${val}"]`);
    if(star){star.classList.add('selected');star.style.animation='none'}
    const fa=document.getElementById('npsFAWrap');if(fa)fa.classList.remove('hidden-step');
    const ta=document.getElementById('fa_q9_fa');if(ta&&answers.q9_fa)ta.value=answers.q9_fa;
  }
  else if(q.type==='fa'){
    const ta=document.getElementById('fa_'+id);if(ta&&val)ta.value=val;
  }
  else if(q.type==='matrix'){
    q.rows.forEach(r=>{
      const v=answers[r.key];if(!v)return;
      const btn=document.querySelector(`.likert-btn[data-key="${r.key}"][data-val="${v}"]`);
      if(btn){btn.classList.add('selected');
        const card=btn.closest('.matrix-card');if(card)card.classList.add('answered')}
    });
  }
  else if(q.type==='multi_step'&&id==='q35'){
    const maVal=answers.q35_ma;if(!maVal)return;
    maVal.split(',').forEach(v=>{
      const opt=document.querySelector(`[data-qid="q35_s0"][data-val="${v}"]`);
      if(opt){opt.classList.add('selected');
        const ft=opt.querySelector('.inline-text');
        if(ft){ft.classList.remove('hidden');
          try{const texts=JSON.parse(answers.q35_ma_text||'{}');if(texts[v])ft.value=texts[v]}catch(e){}}
      }
    });
  }
}

function goToNext(){slideHistory.push(currentSlide);const n=getNextSlide(currentSlide);showSlide(n);if(n==='complete')submitSurvey()}
function goBack(){
  if(slideHistory.length===0)return;
  const prev=slideHistory.pop();
  showSlide(prev);
}
function backBtn(){return slideHistory.length>0?'<button class="btn-back" onclick="goBack()">← 戻る</button>':''}

/* ── Event Handlers ───────────────────────────────── */
function handleEmailTyping(inp){
  const v=inp.value.trim(),chk=document.getElementById('emailCheck');
  const valid=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  if(chk){if(valid){chk.classList.add('show')}else{chk.classList.remove('show')}}
  inp.classList.remove('error');
  const err=document.getElementById('emailError');if(err)err.classList.remove('show');
}
function handleEmailSubmit(){
  const inp=document.getElementById('emailInput'),err=document.getElementById('emailError'),v=inp.value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){inp.classList.add('error');err.classList.add('show');return}
  inp.classList.remove('error');err.classList.remove('show');answers.email=v;goToNext();
}

function handleSAClick(el,hasFT,ftReq){
  const qid=el.dataset.qid,container=el.parentElement;
  container.querySelectorAll('.sa-option').forEach(o=>{o.classList.remove('selected');const f=o.querySelector('.inline-text');if(f)f.classList.add('hidden')});
  el.classList.add('selected');
  emitSparkles(el);
  if(hasFT){const ft=el.querySelector('.inline-text');if(ft){ft.classList.remove('hidden');ft.focus()}}
  // Q2: show/hide inline sub-question for 会社員＋副業
  if(qid==='q2'){
    const wrap=document.getElementById('q2SubWrap');
    if(wrap){
      if(el.dataset.val==='sub'){wrap.classList.remove('hidden-step');wrap.scrollIntoView({behavior:'smooth',block:'nearest'})}
      else{wrap.classList.add('hidden-step');document.querySelectorAll('[data-qid="q2sub"]').forEach(o=>o.classList.remove('selected'))}
    }
  }
  // Q9: show inline Q10 reason
  if(qid==='q9'){const fa=document.getElementById('q9FAWrap');if(fa&&fa.classList.contains('hidden-step')){fa.classList.remove('hidden-step');fa.scrollIntoView({behavior:'smooth',block:'nearest'})}}
}

function handleSASubmit(qid){
  const container=document.querySelector(`[data-qid="${qid}"]`);if(!container)return;
  const card=container.closest('.q-card')||container.parentElement;
  const sel=card.querySelector('.sa-option.selected')||card.querySelector('.funnel-option.selected');
  if(!sel){showInlineError(card,'\u9078\u629E\u3057\u3066\u304F\u3060\u3055\u3044');return}
  const val=sel.dataset.val,opt=getOptDef(qid,val);
  const ft=sel.querySelector('.inline-text');
  if(ft&&!ft.classList.contains('hidden')&&opt&&opt.freeTextRequired&&!ft.value.trim()){ft.style.borderColor='var(--error)';return}
  // Q2: remap 会社員＋副業 based on sub-answer
  if(qid==='q2'&&val==='sub'){
    const subSel=document.querySelector('[data-qid="q2sub"].selected');
    if(!subSel){showInlineError(card,'副業の収入タイプを選んでください');return}
    answers[qid]=subSel.dataset.val; // '2' or '3'
  } else {
    answers[qid]=val;
  }
  if(ft&&ft.value.trim())answers[qid+'_text']=ft.value.trim();
  // Q9: collect Q10 inline FA
  if(qid==='q9'){const fa=document.getElementById('fa_q10');if(fa)answers.q10=fa.value.trim()}
  goToNext();
}

function handleMAClick(el){
  const isEx=el.dataset.exclusive==='true',container=el.parentElement;
  if(isEx){
    container.querySelectorAll('.ma-option').forEach(o=>{if(o!==el){o.classList.remove('selected');const f=o.querySelector('.inline-text');if(f)f.classList.add('hidden')}});
    el.classList.toggle('selected');
  } else {
    container.querySelectorAll('.ma-option[data-exclusive="true"]').forEach(o=>o.classList.remove('selected'));
    el.classList.toggle('selected');
  }
  if(el.classList.contains('selected'))emitSparkles(el);
  const ft=el.querySelector('.inline-text');
  if(ft){if(el.classList.contains('selected')){ft.classList.remove('hidden');ft.focus()}else ft.classList.add('hidden')}
}

function getOptDef(qid,val){
  const q=Q[qid];if(!q)return null;
  const opts=q.options||(q.steps&&q.steps[0]&&q.steps[0].options);
  return opts?opts.find(o=>o.v===val):null;
}

function handleMASubmit(qid){
  const first=document.querySelector(`[data-qid="${qid}"]`);if(!first)return;
  const container=first.closest('.q-card')||first.parentElement;
  const selected=container.querySelectorAll('.ma-option.selected');
  if(selected.length===0){showInlineError(container,'\u3072\u3068\u3064\u4EE5\u4E0A\u9078\u629E\u3057\u3066\u304F\u3060\u3055\u3044');return}
  let valid=true;
  selected.forEach(el=>{
    const ft=el.querySelector('.inline-text');
    const opt=getOptDef(qid,el.dataset.val);
    if(ft&&!ft.classList.contains('hidden')&&opt&&opt.freeTextRequired&&!ft.value.trim()){ft.style.borderColor='var(--error)';valid=false}
  });
  if(!valid)return;
  const vals=[],texts={};
  selected.forEach(el=>{vals.push(el.dataset.val);const ft=el.querySelector('.inline-text');if(ft&&ft.value.trim())texts[el.dataset.val]=ft.value.trim()});
  answers[qid]=vals.join(',');
  if(Object.keys(texts).length)answers[qid+'_text']=JSON.stringify(texts);
  goToNext();
}

function handleFASubmit(qid){
  const q=Q[qid],ta=document.getElementById('fa_'+qid),v=ta.value.trim(),err=document.getElementById('err_'+qid);
  if(q.required&&!v){err.classList.add('show');ta.style.borderColor='var(--error)';return}
  err.classList.remove('show');ta.style.borderColor='';answers[qid]=v;goToNext();
}

/* Q35 inline handler (all 3 steps on one page) */
let q35phase=0; // 0=MA, 1=SA visible, 2=FA visible
function handleQ35Submit(){
  const card=document.querySelector('[data-qid="q35_s0"]')?.closest('.q-card');if(!card)return;
  if(q35phase===0){
    // validate MA
    const selected=card.querySelectorAll('.ma-option.selected');
    if(selected.length===0){showInlineError(card,'ひとつ以上選択してください');return}
    let valid=true;
    selected.forEach(el=>{const ft=el.querySelector('.inline-text');const allO=Q.q35.steps[0].options;const opt=allO.find(o=>o.v===el.dataset.val);
      if(ft&&!ft.classList.contains('hidden')&&opt&&opt.freeTextRequired&&!ft.value.trim()){ft.style.borderColor='var(--error)';valid=false}});
    if(!valid)return;
    const vals=[],texts={};
    selected.forEach(el=>{vals.push(el.dataset.val);const ft=el.querySelector('.inline-text');if(ft&&ft.value.trim())texts[el.dataset.val]=ft.value.trim()});
    answers.q35_ma=vals.join(',');if(Object.keys(texts).length)answers.q35_ma_text=JSON.stringify(texts);
    if(vals.length===1&&vals[0]==='8'){goToNext();return}
    // show step 2 (SA)
    const s2=document.getElementById('q35step2');s2.classList.remove('hidden-step');
    const optsDiv=document.getElementById('q35s1opts');optsDiv.innerHTML='';
    const allOpts=shuffledOptions['q35_s0']||Q.q35.steps[0].options;
    allOpts.filter(o=>vals.includes(o.v)).forEach(o=>{
      optsDiv.innerHTML+=`<div class="sa-option" data-qid="q35_s1" data-val="${o.v}" onclick="handleQ35S1Select(this)">
        <div class="radio"></div><div>${escHtml(o.label)}</div></div>`;
    });
    q35phase=1;
    document.getElementById('q35btn').textContent='次へ';
    s2.scrollIntoView({behavior:'smooth',block:'start'});
  } else if(q35phase===1){
    const sel=card.querySelector('.sa-option.selected[data-qid="q35_s1"]');
    if(!sel){showInlineError(card,'ひとつ選んでください');return}
    answers.q35_sa=sel.dataset.val;
    const s3=document.getElementById('q35step3');s3.classList.remove('hidden-step');
    q35phase=2;
    document.getElementById('q35btn').textContent='次へ';
    s3.scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    const ta=document.getElementById('fa_q35_s2'),v=ta.value.trim(),err=document.getElementById('err_q35_s2');
    if(!v){err.classList.add('show');ta.style.borderColor='var(--error)';return}
    err.classList.remove('show');answers.q35_fa=v;goToNext();
  }
}

}

function burstConfetti(btn){
  const rect=btn.getBoundingClientRect(),emojis=['🎉','✨','🙌','💚','⭐'];
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='confetti';el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText=`left:${rect.left+rect.width/2+((Math.random()-.5)*80)}px;top:${rect.top-10}px;animation-delay:${Math.random()*.2}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
  }
}

function showInlineError(container,msg){
  let e=container.querySelector('.inline-error');
  if(!e){e=document.createElement('div');e.className='error-msg show inline-error';e.textContent=msg;
    const b=container.querySelector('.btn-next');if(b)container.insertBefore(e,b);else container.appendChild(e)}
  else{e.textContent=msg;e.classList.add('show')}
  setTimeout(()=>e.classList.remove('show'),3000);
}

/* ── Submit ────────────────────────────────────────── */
async function submitSurvey(){
  const data={...answers,timestamp:new Date().toISOString(),user_agent:navigator.userAgent,token:POST_TOKEN};
  document.getElementById('submitting').classList.remove('hidden');
  document.getElementById('progressWrap').style.display='none';
  try{await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data),mode:'no-cors'});console.log('Survey submitted',data)}
  catch(e){console.error('Submit error',e)}
  finally{document.getElementById('submitting').classList.add('hidden')}
}

/* ── Rive ──────────────────────────────────────────── */
function initRive(canvasId){
  try{const c=document.getElementById(canvasId);if(!c)return;
    new rive.Rive({src:'happy.riv',canvas:c,autoplay:true,fit:rive.Fit.Contain,
      onLoadError:()=>riveToEmoji(c)})}
  catch(e){console.log('Rive init skipped:',e.message);
    const c=document.getElementById(canvasId);if(c)riveToEmoji(c)}
}
function riveToEmoji(canvas){
  const p=canvas.parentElement;if(!p)return;
  canvas.style.display='none';
  if(!p.querySelector('.mascot-emoji')){
    const e=document.createElement('span');e.className='mascot-emoji';e.textContent='🐶';
    e.style.cssText='font-size:28px;line-height:1;display:block';p.appendChild(e);
  }
}

/* ── Init ──────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{
  showSlide('intro');
});
</script>
